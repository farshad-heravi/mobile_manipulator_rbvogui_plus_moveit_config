# MoveIt uses this configuration for controller management.
# The rg6 gripper controller is intentionally absent here: rg6 is now a
# separate detachable Gazebo model with its own controller manager at
# /rg6_tool/controller_manager.  It is spawned by spawn_tools.launch.py.

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - /robot/joint_trajectory_controller

  /robot/joint_trajectory_controller:
    type: FollowJointTrajectory
    joints:
      - robot_arm_shoulder_pan_joint
      - robot_arm_shoulder_lift_joint
      - robot_arm_elbow_joint
      - robot_arm_wrist_1_joint
      - robot_arm_wrist_2_joint
      - robot_arm_wrist_3_joint
    action_ns: follow_joint_trajectory
    default: true
